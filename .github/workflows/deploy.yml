name: Deploy Netflix Clone Stack

on:
  push:
    branches:
      - main
      - master

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Install Backend App Dependencies
        run: |
          cd app-code
          npm install --registry=https://registry.npmjs.org/

      - name: Install CDK Infra Dependencies
        run: |
          cd ..
          npm install

      - name: Deploy CDK Stack
        run: |
          npx cdk deploy --all --require-approval never

      - name: Install and Build Frontend App
        run: |
          cd app-code/frontend
          npm install --registry=https://registry.npmjs.org/
          npm run build

      - name: Deploy Frontend to S3
        run: |
          aws s3 sync app-code/frontend/dist s3://netflix-web-952804383463-us-east-1 --delete

      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation --distribution-id E23Y4F01FGJWQP --paths "/*"
